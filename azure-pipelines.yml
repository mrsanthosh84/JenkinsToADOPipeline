trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

stages:
  - stage: Build_Test
    displayName: 'Build & Test'
    jobs:
      - job: PHP_Laravel
        displayName: 'PHP Laravel'
        pool:
          name: 'LocalAgent'
        timeoutInMinutes: 15
        steps:
          - checkout: self
            fetchDepth: 1

          - task: Cache@2
            displayName: 'Cache Composer packages'
            inputs:
              key: 'composer | $(Build.SourcesDirectory)\php\composer.lock'
              path: $(Build.SourcesDirectory)\php\vendor
              cacheHitVar: COMPOSER_CACHE_HIT

          - script: |
              "C:\Users\v-samanickam\AppData\Local\ComposerSetup\bin\composer.bat" install --no-interaction --no-dev --prefer-dist --optimize-autoloader --no-scripts
            workingDirectory: $(Build.SourcesDirectory)\php
            condition: ne(variables.COMPOSER_CACHE_HIT, 'true')
            displayName: 'Composer Install'

          - script: |
              if not exist .env copy .env.example .env
              "C:\php\php.exe" artisan key:generate --force
            workingDirectory: $(Build.SourcesDirectory)\php
            displayName: 'Laravel Setup'

          - script: |
              "C:\php\php.exe" vendor\bin\phpunit --configuration phpunit.xml --no-coverage --log-junit $(Build.ArtifactStagingDirectory)\php-test-results.xml
            workingDirectory: $(Build.SourcesDirectory)\php
            displayName: 'Run PHPUnit Tests'

          - task: PublishTestResults@2
            displayName: 'Publish PHP Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(Build.ArtifactStagingDirectory)\php-test-results.xml'
              testRunTitle: 'PHP Laravel Tests'
            condition: always()

      - job: NodeJS
        displayName: 'Node.js'
        pool:
          name: 'LocalAgent'
        timeoutInMinutes: 15
        steps:
          - checkout: self
            fetchDepth: 1

          - task: Cache@2
            displayName: 'Cache npm packages'
            inputs:
              key: 'npm | $(Build.SourcesDirectory)\Nodejs\package-lock.json'
              path: $(Build.SourcesDirectory)\Nodejs\node_modules
              cacheHitVar: NPM_CACHE_HIT

          - script: |
              "C:\Program Files\nodejs\npm.cmd" ci --prefer-offline
            workingDirectory: $(Build.SourcesDirectory)\Nodejs
            condition: ne(variables.NPM_CACHE_HIT, 'true')
            displayName: 'npm Install'

          - script: |
              "C:\Program Files\nodejs\npm.cmd" test -- --forceExit --no-coverage --testTimeout=5000
            workingDirectory: $(Build.SourcesDirectory)\Nodejs
            displayName: 'Run Jest Tests'
            env:
              JEST_JUNIT_OUTPUT_DIR: $(Build.ArtifactStagingDirectory)
              JEST_JUNIT_OUTPUT_NAME: node-test-results.xml

          - task: PublishTestResults@2
            displayName: 'Publish Node Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(Build.ArtifactStagingDirectory)\node-test-results.xml'
              testRunTitle: 'Node.js Tests'
            condition: always()
